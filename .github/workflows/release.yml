name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest,  cgo: 1 }
          - { goos: linux,   goarch: arm64, runner: ubuntu-24.04-arm, cgo: 1 }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,   cgo: 0 }
          - { goos: darwin,  goarch: amd64, runner: macos-latest,   cgo: 0 }
          - { goos: windows, goarch: amd64, runner: windows-latest, cgo: 0 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install ALSA (linux cgo)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXT=""; [ "$GOOS" = windows ] && EXT=".exe"
          OUT="deezertui-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "$OUT" ./cmd/deezertui
          echo "ARTIFACT=$OUT" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          fail_on_unmatched_files: true
