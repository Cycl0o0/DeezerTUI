# golangci-lint v2 configuration for OpenDeezer.
version: "2"

run:
  build-tags:
    - linux

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
  settings:
    govet:
      # The MPRIS D-Bus Seek method's signature is fixed by the spec/godbus and
      # can't satisfy io.Seeker; disable just that analyzer (all others stay on).
      disable:
        - stdmethods
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      # The cgo bridge intentionally ignores some errors at the C boundary.
      - path: corelib/deezercore.go
        linters:
          - errcheck
