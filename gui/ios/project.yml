name: OpenDeezer
options:
  bundleIdPrefix: fr.cyclooo
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  OpenDeezer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/OpenDeezer
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.cyclooo.OpenDeezer
        PRODUCT_NAME: OpenDeezer
        INFOPLIST_FILE: Sources/OpenDeezer/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        VALIDATE_WORKSPACE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - framework: Odmobile.xcframework
        embed: true
